name: Infrastructure

on:
  push:
    branches: [main, prod]
    paths:
      - 'tofu/**'
      - 'compose/**'
      - 'scripts/**'
      - '.github/workflows/infrastructure.yml'
      - 'mise.toml'
  pull_request:
    branches: [main, prod]
    paths:
      - 'tofu/**'
      - 'compose/**'
      - 'scripts/**'
      - '.github/workflows/infrastructure.yml'
      - 'mise.toml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: tofu-state
  cancel-in-progress: false

jobs:
  fmt:
    name: OpenTofu Format
    runs-on: ubuntu-latest
    env:
      FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Install tools
        run: mise install

      - name: Check formatting
        run: fnox exec -- tofu fmt -check -recursive

  validate:
    name: OpenTofu Validate
    runs-on: ubuntu-latest
    env:
      FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Install tools
        run: mise install

      - name: Checkout patched dokploy provider
        uses: actions/checkout@v6
        with:
          repository: CrystalMethod/terraform-provider-dokploy
          ref: fix/backup-metadata-nested-v2
          path: terraform-provider-dokploy

      - name: Build patched provider
        run: |
          cd terraform-provider-dokploy
          PROVIDER_DIR="$HOME/.terraform.d/plugins/registry.terraform.io/ahmedali6/dokploy/0.0.1+dev/linux_amd64"
          mkdir -p "$PROVIDER_DIR"
          go build -o "$PROVIDER_DIR/terraform-provider-dokploy_v0.0.1" .

      - name: Configure tofu dev overrides
        run: |
          cat > /tmp/tofu-dev.tfrc <<'EOF'
          provider_installation {
            dev_overrides {
              "registry.terraform.io/ahmedali6/dokploy" = "/home/runner/.terraform.d/plugins/registry.terraform.io/ahmedali6/dokploy/0.0.1+dev/linux_amd64"
            }
            direct {}
          }
          EOF
          echo "TF_CLI_CONFIG_FILE=/tmp/tofu-dev.tfrc" >> "$GITHUB_ENV"

      - name: Tofu Init (Infra)
        run: fnox exec -- tofu -chdir=tofu/00-infra init -input=false

      - name: Tofu Validate (Infra)
        run: fnox exec -- tofu -chdir=tofu/00-infra validate

      - name: Tofu Init (Platform)
        run: fnox exec -- tofu -chdir=tofu/01-platform init -input=false

      - name: Tofu Validate (Platform)
        run: fnox exec -- tofu -chdir=tofu/01-platform validate

  plan:
    name: OpenTofu Plan
    needs: [fmt, validate]
    runs-on: ubuntu-latest
    env:
      FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Install tools
        run: mise install

      - name: Checkout patched dokploy provider
        uses: actions/checkout@v6
        with:
          repository: CrystalMethod/terraform-provider-dokploy
          ref: fix/backup-metadata-nested-v2
          path: terraform-provider-dokploy

      - name: Build patched provider
        run: |
          cd terraform-provider-dokploy
          PROVIDER_DIR="$HOME/.terraform.d/plugins/registry.terraform.io/ahmedali6/dokploy/0.0.1+dev/linux_amd64"
          mkdir -p "$PROVIDER_DIR"
          go build -o "$PROVIDER_DIR/terraform-provider-dokploy_v0.0.1" .

      - name: Configure tofu dev overrides
        run: |
          cat > /tmp/tofu-dev.tfrc <<'EOF'
          provider_installation {
            dev_overrides {
              "registry.terraform.io/ahmedali6/dokploy" = "/home/runner/.terraform.d/plugins/registry.terraform.io/ahmedali6/dokploy/0.0.1+dev/linux_amd64"
            }
            direct {}
          }
          EOF
          echo "TF_CLI_CONFIG_FILE=/tmp/tofu-dev.tfrc" >> "$GITHUB_ENV"

      - name: Tofu Init (Infra)
        run: fnox exec -- tofu -chdir=tofu/00-infra init -input=false

      - name: Tofu Plan (Infra)
        run: fnox exec -- tofu -chdir=tofu/00-infra plan -input=false -out=tfplan

      - name: Upload Infra Plan
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-infra
          path: tofu/00-infra/tfplan
          retention-days: 5

      - name: Tofu Init (Platform)
        run: fnox exec -- tofu -chdir=tofu/01-platform init -input=false

      - name: Tofu Plan (Platform)
        run: fnox exec -- tofu -chdir=tofu/01-platform plan -input=false -out=tfplan

      - name: Upload Platform Plan
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-platform
          path: tofu/01-platform/tfplan
          retention-days: 5

  apply:
    name: OpenTofu Apply
    needs: plan
    # Apply must be run locally with patched dokploy provider.
    # CI uses upstream provider which has known env/compose bugs.
    # This job is a no-op placeholder to satisfy branch protection.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    env:
      FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
    steps:
      - name: Skip Apply
        run: echo "Apply must be run locally with patched dokploy provider"
