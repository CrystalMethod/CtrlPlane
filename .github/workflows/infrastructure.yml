name: Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'tofu/**'
      - '.github/workflows/infrastructure.yml'
      - 'mise.toml'
  pull_request:
    branches: [main]
    paths:
      - 'tofu/**'
      - '.github/workflows/infrastructure.yml'
      - 'mise.toml'

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: OpenTofu Plan
    runs-on: ubuntu-latest
    env:
      FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install

      - name: Tofu Init (Infra)
        run: fnox exec -- tofu -chdir=tofu/00-infra init -input=false

      - name: Tofu Plan (Infra)
        run: fnox exec -- tofu -chdir=tofu/00-infra plan -input=false

      - name: Tofu Init (Platform)
        run: fnox exec -- tofu -chdir=tofu/01-platform init -input=false

      - name: Tofu Plan (Platform)
        run: fnox exec -- tofu -chdir=tofu/01-platform plan -input=false || true

  apply:
    name: OpenTofu Apply
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    env:
      FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install

      - name: Tofu Init (Infra)
        run: fnox exec -- tofu -chdir=tofu/00-infra init -input=false

      - name: Tofu Apply (Infra)
        run: fnox exec -- tofu -chdir=tofu/00-infra apply -input=false -auto-approve

      - name: Tofu Init (Platform)
        run: fnox exec -- tofu -chdir=tofu/01-platform init -input=false

      - name: Tofu Apply (Platform)
        run: fnox exec -- tofu -chdir=tofu/01-platform apply -input=false -auto-approve || true
